<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signway Hand Animation Demo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        model-viewer {
            width: 100%;
            height: 500px;
            background-color: #f0f4f8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign Language Hand Animation Demo</h1>
        <p>This demo shows the 3D hand animation generated from the Signway pipeline.</p>
        <model-viewer src="hand_animation.glb" alt="Hand Animation" camera-controls autoplay loop>
        </model-viewer>
        <p>
            <em>Model generated using Blender and MediaPipe hand landmark data.</em>
        </p>
    </div>
</body>
</html>
